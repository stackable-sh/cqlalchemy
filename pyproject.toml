version = "4.1.1-alpha"
description = "An intuitive, pragmatic, and beautiful database toolkit for Apache Cassandra"
authors = ["Iroiso Ikpokonte <iroiso@live.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.10"
